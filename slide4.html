<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 4 - Requirements</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: Arial, sans-serif;
        }
        .slide {
            width: 100%;
            height: 100vh;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }
        h1 {
            color: #003366;
            text-align: center;
        }
        h2 {
            color: #000;
        }
        ul {
            font-size: 22px;
            line-height: 1.7;
        }
        .nav-btns {
            text-align: center;
            margin-top: 30px;
        }
        button {
            padding: 12px 25px;
            background: #003366;
            color: white;
            border: none;
            margin: 10px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0055aa;
        }
    </style>

</head>
<body>

<div class="slide">

    <h1>Software & Hardware Requirements</h1>

    <h2>Software:</h2>
    <ul>
        <li>HTML5</li>
        <li>CSS3</li>
        <li>VS Code / Any Editor</li>
        <li>Chrome / Firefox Browser</li>
    </ul>

    <h2>Hardware:</h2>
    <ul>
        <li>Computer / Laptop</li>
        <li>Minimum 4 GB RAM</li>
        <li>Any OS (Windows/Linux/Mac)</li>
    </ul>

    <div class="nav-btns">
        <button onclick="location.href='slide3.html'">⬅ Back</button>
        <button onclick="location.href='slide5.html'">Next ➜</button>
    </div>

</div>

</body>
</html>
